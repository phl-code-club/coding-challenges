{{ define "page" }}
<main>
  <h1>Create Your Dream Team</h1>
  <form class="team-form" method="post">
    <div>
      <label aria-hidden="" for="team-name">Team Name</label>
      <input type="text" name="team-name" required placeholder="Fritzy's Fabled Fellowship">
    </div>
    <div>
      <label aria-hidden for="team-members">Team Members</label>
      <input type="text" name="team-members" required placeholder="Graham, Christina, Inessa">
    </div>
    <button class="button-style" type="submit">Submit</button>
  </form>
</main>
{{ end }}
